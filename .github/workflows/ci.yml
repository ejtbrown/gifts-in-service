name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
        env:
          POSTGRES_DB: gifts_in_service
          POSTGRES_USER: gis
          POSTGRES_PASSWORD: gis-local-only
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U gis -d gifts_in_service"
          --health-interval 5s --health-timeout 5s --health-retries 12
      mailpit:
        image: axllent/mailpit:v1.27.8@sha256:6abc8e633df15eaf785cfcf38bae48e66f64beecdc03121e249d0f9ec15f0707
        ports: [1025:1025, 8025:8025]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.3.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm format:check && pnpm lint && pnpm typecheck
      - run: pnpm test && pnpm eval:ai && pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm test:a11y
      - run: pnpm build && pnpm build:lambdas
      - run: pnpm audit:dependencies && pnpm audit:repo
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'push'
        with:
          name: deployment-bundle-${{ github.sha }}
          path: |
            apps/web/dist
            dist/lambda
          retention-days: 3
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
          retention-days: 7

  terraform:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.3
      - run: bash scripts/terraform-validate.sh
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          severity: HIGH,CRITICAL
          exit-code: "1"

  deploy:
    if: github.event_name == 'push'
    needs: [application, terraform]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: deploy-${{ github.ref_name }}
      cancel-in-progress: false
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.3.0
          cache: pnpm
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.3
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deployment-bundle-${{ github.sha }}
          path: .
      - name: Deployment preflight
        env:
          DEPLOY_ENVIRONMENT: ${{ env.DEPLOY_ENV }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CHECK_AWS_ENGINE_VERSION: "true"
          SES_IDENTITY: ${{ vars.SES_IDENTITY }}
          BEDROCK_ZERO_RETENTION_CONFIRMED: ${{ vars.BEDROCK_ZERO_RETENTION_CONFIRMED }}
          BEDROCK_INVOCATION_LOGGING_REVIEWED: ${{ vars.BEDROCK_INVOCATION_LOGGING_REVIEWED }}
          BODY_LOGGING_DISABLED_CONFIRMED: ${{ vars.BODY_LOGGING_DISABLED_CONFIRMED }}
          SES_PRODUCTION_READY: ${{ vars.SES_PRODUCTION_READY }}
          POLICY_COPY_REVIEWED: ${{ vars.POLICY_COPY_REVIEWED }}
        run: |
          if [[ "${DEPLOY_ENV}" == "prod" ]]; then
            pnpm preflight -- --production
          else
            pnpm preflight
          fi
      - name: Terraform plan and apply
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_privacy_preflight_confirmed: ${{ env.DEPLOY_ENV == 'prod' && 'true' || 'false' }}
          TF_VAR_ses_production_ready: ${{ env.DEPLOY_ENV == 'prod' && 'true' || 'false' }}
          TF_VAR_church_display_name: ${{ vars.CHURCH_DISPLAY_NAME }}
          TF_VAR_privacy_contact_email: ${{ vars.PRIVACY_CONTACT_EMAIL }}
          TF_VAR_help_contact_email: ${{ vars.HELP_CONTACT_EMAIL }}
          TF_VAR_ses_sender_email: ${{ vars.SES_SENDER_EMAIL }}
          TF_VAR_ses_sender_domain: ${{ vars.SES_SENDER_DOMAIN }}
          TF_VAR_ses_use_domain_identity: ${{ vars.SES_USE_DOMAIN_IDENTITY || 'false' }}
          TF_VAR_ses_manage_sender_identity: ${{ vars.SES_MANAGE_SENDER_IDENTITY || 'true' }}
          TF_VAR_budget_alert_email: ${{ vars.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_custom_domain_name: ${{ vars.CUSTOM_DOMAIN_NAME }}
          TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
        run: |
          terraform -chdir=infra/environments/${DEPLOY_ENV} init -input=false \
            -backend-config=bucket=${{ vars.TF_STATE_BUCKET }} \
            -backend-config=key=${DEPLOY_ENV}/terraform.tfstate \
            -backend-config=region=${{ vars.AWS_REGION }} \
            -backend-config=kms_key_id=${{ vars.TF_STATE_KMS_KEY_ARN }}
          terraform -chdir=infra/environments/${DEPLOY_ENV} plan -input=false -out=tfplan
          terraform -chdir=infra/environments/${DEPLOY_ENV} show -json tfplan |
            jq '{changes: [.resource_changes[]? | {address, actions: .change.actions}]}' \
              > infra/environments/${DEPLOY_ENV}/plan-summary.json
          {
            echo "### Terraform ${DEPLOY_ENV} plan (resource addresses/actions only)"
            echo '```json'
            cat infra/environments/${DEPLOY_ENV}/plan-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          terraform -chdir=infra/environments/${DEPLOY_ENV} apply -input=false tfplan
      - name: Run database migrations
        run: aws lambda invoke --function-name gis-${DEPLOY_ENV}-migration --cli-binary-format raw-in-base64-out --payload '{}' /tmp/migration.json && jq -e 'has("errorType") | not' /tmp/migration.json
      - name: Publish frontend
        run: |
          bucket=$(terraform -chdir=infra/environments/${DEPLOY_ENV} output -raw frontend_bucket)
          distribution=$(terraform -chdir=infra/environments/${DEPLOY_ENV} output -raw distribution_id)
          key=$(terraform -chdir=infra/environments/${DEPLOY_ENV} output -raw kms_key_arn)
          aws s3 sync apps/web/dist "s3://${bucket}" --delete --sse aws:kms --sse-kms-key-id "${key}"
          aws cloudfront create-invalidation --distribution-id "${distribution}" --paths '/*'
