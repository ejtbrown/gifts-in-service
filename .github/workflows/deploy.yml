name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub Environment to deploy
        type: choice
        options: [dev, prod]
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'dev' || inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.3.0
          cache: pnpm
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.14.3
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck && pnpm test && pnpm eval:ai && pnpm build && pnpm build:lambdas
      - name: Deployment preflight
        env:
          DEPLOY_ENVIRONMENT: ${{ env.DEPLOY_ENV }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CHECK_AWS_ENGINE_VERSION: "true"
          SES_IDENTITY: ${{ vars.SES_IDENTITY }}
          BEDROCK_ZERO_RETENTION_CONFIRMED: ${{ vars.BEDROCK_ZERO_RETENTION_CONFIRMED }}
          BEDROCK_INVOCATION_LOGGING_REVIEWED: ${{ vars.BEDROCK_INVOCATION_LOGGING_REVIEWED }}
          BODY_LOGGING_DISABLED_CONFIRMED: ${{ vars.BODY_LOGGING_DISABLED_CONFIRMED }}
          SES_PRODUCTION_READY: ${{ vars.SES_PRODUCTION_READY }}
          POLICY_COPY_REVIEWED: ${{ vars.POLICY_COPY_REVIEWED }}
        run: |
          if [[ "${DEPLOY_ENV}" == "prod" ]]; then
            pnpm preflight -- --production
          else
            pnpm preflight
          fi
      - name: Terraform apply
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_privacy_preflight_confirmed: ${{ env.DEPLOY_ENV == 'prod' && 'true' || 'false' }}
          TF_VAR_ses_production_ready: ${{ env.DEPLOY_ENV == 'prod' && 'true' || 'false' }}
          TF_VAR_church_display_name: ${{ vars.CHURCH_DISPLAY_NAME }}
          TF_VAR_privacy_contact_email: ${{ vars.PRIVACY_CONTACT_EMAIL }}
          TF_VAR_help_contact_email: ${{ vars.HELP_CONTACT_EMAIL }}
          TF_VAR_ses_sender_email: ${{ vars.SES_SENDER_EMAIL }}
          TF_VAR_ses_sender_domain: ${{ vars.SES_SENDER_DOMAIN }}
          TF_VAR_ses_use_domain_identity: ${{ vars.SES_USE_DOMAIN_IDENTITY || 'false' }}
          TF_VAR_ses_manage_sender_identity: ${{ vars.SES_MANAGE_SENDER_IDENTITY || 'true' }}
          TF_VAR_budget_alert_email: ${{ vars.BUDGET_ALERT_EMAIL }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_custom_domain_name: ${{ vars.CUSTOM_DOMAIN_NAME }}
          TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
        run: |
          terraform -chdir=infra/environments/${{ env.DEPLOY_ENV }} init -input=false \
            -backend-config=bucket=${{ vars.TF_STATE_BUCKET }} \
            -backend-config=key=${{ env.DEPLOY_ENV }}/terraform.tfstate \
            -backend-config=region=${{ vars.AWS_REGION }} \
            -backend-config=kms_key_id=${{ vars.TF_STATE_KMS_KEY_ARN }}
          terraform -chdir=infra/environments/${{ env.DEPLOY_ENV }} apply -input=false -auto-approve
      - name: Run database migrations
        run: aws lambda invoke --function-name gis-${{ env.DEPLOY_ENV }}-migration --cli-binary-format raw-in-base64-out --payload '{}' /tmp/migration.json && jq -e 'has("errorType") | not' /tmp/migration.json
      - name: Publish frontend
        run: |
          bucket=$(terraform -chdir=infra/environments/${{ env.DEPLOY_ENV }} output -raw frontend_bucket)
          distribution=$(terraform -chdir=infra/environments/${{ env.DEPLOY_ENV }} output -raw distribution_id)
          key=$(terraform -chdir=infra/environments/${{ env.DEPLOY_ENV }} output -raw kms_key_arn)
          aws s3 sync apps/web/dist "s3://${bucket}" --delete --sse aws:kms --sse-kms-key-id "${key}"
          aws cloudfront create-invalidation --distribution-id "${distribution}" --paths '/*'
