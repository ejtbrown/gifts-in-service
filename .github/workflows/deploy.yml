name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  repair-plan-role:
    if: github.ref == 'refs/heads/agent/branch-aware-deployments'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: dev
    steps:
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Add read-only Terraform plan permissions
        run: |
          aws iam put-role-policy \
            --role-name gis-dev-github-plan \
            --policy-name terraform-plan-data-sources \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Action": [
                  "cloudfront:GetCachePolicy",
                  "cloudfront:ListCachePolicies",
                  "ec2:DescribeAvailabilityZones"
                ],
                "Resource": "*"
              }]
            }'
