name: Bug report
description: Report a reproducible application or operations defect without personal data.
body:
  - type: markdown
    attributes:
      value: Do not include names, email addresses, profiles, interview text, tokens, or credentials.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction with fictional data
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
